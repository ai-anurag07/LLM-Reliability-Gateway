name: LLM Gateway CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-gateway:
    runs-on: ubuntu-latest
    
    # 1. This magically spins up a Redis container inside GitHub Actions!
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # 2. We explicitly install the missing libraries here!
        run: pip install -r requirements.txt requests google-generativeai redis slowapi deepeval

      - name: Start Gateway in Background
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m uvicorn app.main:app --port 8000 &
          sleep 10 

      - name: Run Regression Suite
        run: python ci_eval/run_regression.py
